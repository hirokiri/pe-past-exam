# ローカル開発用 Compose ファイル（podman-compose / podman compose 用）
#
#   本番相当:   podman compose up app
#   開発モード: podman compose up dev  （ソース・コンテンツをマウントしてホットリロード）
services:
  app:
    build:
      context: .
      dockerfile: Containerfile
    ports:
      - "3000:3000"

  dev:
    image: docker.io/oven/bun:1
    working_dir: /app
    command: sh -c "bun install && bun run dev --host"
    ports:
      - "5173:5173"
    volumes:
      - .:/app:Z
      - node_modules:/app/node_modules

volumes:
  node_modules:
